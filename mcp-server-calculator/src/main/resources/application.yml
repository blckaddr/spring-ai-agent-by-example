server:
  port: 8082

spring:
  application:
    name: mcp-server-calculator
  ai:
    mcp:
      server:
        protocol: STREAMABLE
        type: SYNC
        name: calculator-tools
        version: 0.0.1
        streamable-http:
          mcp-endpoint: /mcp        # tools served at http://localhost:8082/mcp

logging:
  level:
    org.springframework.ai: INFO

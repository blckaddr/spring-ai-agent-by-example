server:
  port: 8080

spring:
  application:
    name: agent
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        # Model is config, never hardcoded. Override with AGENT_MODEL env var.
        # Must be a TOOL-CAPABLE model (see docs/adr/0002).
        model: ${AGENT_MODEL:llama3.1:8b}
        temperature: 0.1            # low temp → more deterministic tool use
    mcp:
      client:
        type: SYNC
        name: agent
        toolcallback:
          enabled: true             # surface remote MCP tools as ToolCallbacks
        streamable-http:
          connections:
            currency:
              url: http://localhost:8081
              endpoint: /mcp
            calculator:
              url: http://localhost:8082
              endpoint: /mcp
            feestax:                  # Phase 6: a 3rd specialist server, for richer planning
              url: http://localhost:8083
              endpoint: /mcp

agent:
  chat:
    # The single-agent chat is a currency + calculator assistant. INCLUDE list (whitelist) of MCP
    # server names it may use — anything else (e.g. the Phase-6 planning-only feestax server) stays
    # out, which keeps the small local model reliable. The planner (PlanService) still sees ALL
    # servers via the tool catalog. Blank = include all. See book Ch 11 for why.
    tool-servers: currency-tools,calculator-tools
  async:
    pool-size: 4              # background workers for detached runs (Phase 4)
  safety:
    max-steps: 20            # hard cap on tool steps per run
    max-wall-clock-ms: 120000  # detached run is marked FAILED if it overruns this

logging:
  level:
    com.example.agent: INFO
    org.springframework.ai: INFO
